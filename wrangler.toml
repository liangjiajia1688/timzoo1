# ============================================================
# TimZoo 探店管理 - Cloudflare 部署配置
# 使用方式:
#   1. 创建 D1 数据库: npx wrangler d1 create timzoo-db
#   2. 初始化表结构: npx wrangler d1 execute timzoo-db --file=./schema.sql
#   3. 本地开发:     npx wrangler dev
#   4. 部署:         npx wrangler deploy
# ============================================================

name = "timzoo"
# 注意: 部署到 Pages 时，不要设置 main 字段
# main 由 Pages 自动从 functions/ 目录加载
# main = "worker.js"  ← 已注释，避免与 Pages 静态文件托管冲突
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# D1 数据库绑定
[[d1_databases]]
binding = "DB"
database_name = "timzoo-db"
database_id = "589a35f0-a09e-4e3b-9d65-2ee8be0f097d"  # timzoo-db production

# ============================================================
# Cloudflare Pages 前端配置（可选）
# 如果前端和后端分开部署，使用下面的 Pages 配置
# 如果使用 Worker 统一托管静态文件，则不需要此段
# ============================================================
#
# [pages]
# build_output_dir = "../web-client/src"
#
# [[rules]]
# type = "EsModule"
# globs = ["**/*.js"]
#
# [[rules]]
# type = "Text"
# globs = ["**/*.html"]
#

# ============================================================
# 开发环境变量
# [env.development]
# [[env.development.d1_databases]]
# binding = "DB"
# database_name = "timzoo-db"
# database_id = "<YOUR_LOCAL_D1_ID>"

# ============================================================
# 生产环境变量
# [env.production]
# [[env.production.d1_databases]]
# binding = "DB"
# database_name = "timzoo-db"
# database_id = "<YOUR_PRODUCTION_D1_ID>"
